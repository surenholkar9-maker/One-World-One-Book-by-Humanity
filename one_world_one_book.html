
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; }
  #app { background: #0a0a0f; min-height: 600px; color: #e8d5b7; }

  .hero {
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, #0a0a0f 100%),
      url('https://media.base44.com/images/public/69ce5296d956112b2568844a/2f052aaf3_generated_image.png') center/cover no-repeat;
    padding: 60px 24px 50px;
    text-align: center;
  }
  .hero-badge { font-size: 12px; letter-spacing: 4px; color: #c0a060; text-transform: uppercase; margin-bottom: 16px; }
  .hero h1 { font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: bold; line-height: 1.2; color: #fff; margin-bottom: 20px; }
  .hero h1 span { color: #c0a060; }
  .hero p { font-size: clamp(0.9rem, 2vw, 1.1rem); line-height: 1.8; color: #ccc; max-width: 540px; margin: 0 auto 28px; }
  .stats { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }
  .stat-val { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: bold; color: #c0a060; }
  .stat-lbl { font-size: 11px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  .btn-gold { background: linear-gradient(135deg, #c0a060, #e8c870); color: #0a0a0f; border: none; padding: 14px 40px; font-size: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px; font-family: Georgia, serif; }
  .btn-gold:disabled { background: #555; cursor: not-allowed; }

  .banner { background: #1a0a0a; border-top: 1px solid #3a1a1a; border-bottom: 1px solid #3a1a1a; padding: 32px 24px; text-align: center; }
  .banner p { max-width: 640px; margin: 0 auto; font-size: 1rem; line-height: 2; color: #d4a0a0; font-style: italic; }

  .tabs-wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
  .tabs { display: flex; border-bottom: 1px solid #2a2a3a; margin-bottom: 28px; }
  .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-family: Georgia, serif; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 2px solid transparent; color: #666; }
  .tab-btn.active { color: #c0a060; border-bottom-color: #c0a060; }

  .section-title { color: #c0a060; margin-bottom: 20px; font-size: 1.1rem; letter-spacing: 2px; }
  .empty-state { text-align: center; padding: 50px 0; color: #555; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

  .contrib-item { border-left: 3px solid #c0a060; padding-left: 18px; margin-bottom: 24px; }
  .contrib-text { font-size: 1rem; line-height: 1.8; color: #e8d5b7; font-style: italic; margin-bottom: 6px; }
  .contrib-meta { font-size: 11px; color: #666; display: flex; gap: 14px; flex-wrap: wrap; }

  .lb-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid #1a1a2a; }
  .lb-rank { font-size: 1.3rem; width: 36px; text-align: center; color: #444; }
  .lb-rank.top { color: #c0a060; }
  .lb-name { color: #e8d5b7; font-weight: bold; font-size: 0.95rem; }
  .lb-sub { color: #666; font-size: 11px; }
  .lb-pts { color: #c0a060; font-weight: bold; margin-left: auto; }

  .how-item { display: flex; gap: 16px; margin-bottom: 24px; }
  .how-icon { font-size: 22px; flex-shrink: 0; }
  .how-title { color: #c0a060; font-weight: bold; margin-bottom: 4px; font-size: 0.95rem; }
  .how-desc { color: #aaa; line-height: 1.7; font-size: 0.9rem; }
  .scoring-box { background: #1a1a0a; border: 1px solid #3a3a1a; padding: 20px; margin-top: 12px; font-size: 13px; color: #aaa; line-height: 2; }
  .scoring-title { color: #c0a060; font-weight: bold; margin-bottom: 8px; }

  .cta-footer { background: linear-gradient(135deg, #1a0a0a, #0a0a1a); padding: 50px 24px; text-align: center; border-top: 1px solid #2a1a1a; }
  .cta-footer h2 { color: #c0a060; font-size: clamp(1.3rem, 3vw, 2rem); margin-bottom: 14px; }
  .cta-footer p { color: #888; margin-bottom: 28px; max-width: 460px; margin-left: auto; margin-right: auto; line-height: 1.8; font-size: 0.9rem; }

  .site-footer { text-align: center; padding: 18px; color: #333; font-size: 11px; }

  /* MODAL */
  .modal-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.92);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 24px; min-height: 600px;
  }
  .modal-box { background: #0f0f1a; border: 1px solid #3a3a2a; padding: 32px; max-width: 520px; width: 100%; margin-top: 20px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { color: #c0a060; font-size: 1.2rem; }
  .modal-close { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; }
  .modal-quote { color: #888; margin-bottom: 20px; line-height: 1.7; font-style: italic; border-left: 2px solid #c0a060; padding-left: 12px; font-size: 0.9rem; }
  .form-label { display: block; color: #888; font-size: 11px; margin-bottom: 5px; letter-spacing: 1px; }
  .form-group { margin-bottom: 14px; }
  .form-input { width: 100%; background: #1a1a2a; border: 1px solid #3a3a4a; color: #e8d5b7; padding: 10px 14px; font-family: Georgia, serif; font-size: 0.9rem; }
  .form-input:focus { outline: none; border-color: #c0a060; }
  .type-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn { padding: 7px 14px; border: 1px solid #3a3a4a; background: none; color: #666; cursor: pointer; font-family: Georgia, serif; font-size: 12px; }
  .type-btn.active { border-color: #c0a060; background: #2a2010; color: #c0a060; }
  .error-box { background: #2a0a0a; border: 1px solid #5a1a1a; color: #e08080; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; }
  .success-msg { margin-top: 20px; }
  .success-msg .thanks { color: #c0a060; font-size: 1rem; margin-bottom: 10px; }
  .share-label { color: #888; font-size: 11px; margin-bottom: 10px; letter-spacing: 1px; }
  .share-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .share-btn { padding: 9px 18px; color: #fff; text-decoration: none; font-family: Georgia, serif; font-size: 12px; font-weight: bold; }
</style>

<div id="app">
  <div id="root"></div>
</div>

<script>
const SAMPLE_CONTRIBS = [
  { id:1, contributor_name:"Priya S.", contributor_country:"India", content:"Even in the deepest silence, the earth remembers every seed that dared to dream of light.", content_type:"Line", contribution_score:10 },
  { id:2, contributor_name:"Ahmed K.", contributor_country:"Palestine", content:"My grandmother's hands carried whole worlds in their creases — flour, soil, tears, and stubborn hope.", content_type:"Paragraph", contribution_score:30 },
  { id:3, contributor_name:"Sofia L.", contributor_country:"Ukraine", content:"We are not the borders they drew on maps. We are the rivers that refuse to stop.", content_type:"Line", contribution_score:10 },
  { id:4, contributor_name:"James O.", contributor_country:"Nigeria", content:"The sun sets on every nation equally. It does not ask for passports.", content_type:"Line", contribution_score:10 },
];

let state = {
  contributions: [...SAMPLE_CONTRIBS],
  showForm: false,
  activeTab: "wall",
  submitted: false,
  submittedData: null,
  loading: false,
  submitError: null,
  form: { name:"", country:"", email:"", type:"Line", content:"" }
};

const COUNTRIES = ["Afghanistan","Albania","Algeria","Argentina","Australia","Austria","Bangladesh","Belgium","Bolivia","Brazil","Cambodia","Canada","Chile","China","Colombia","Croatia","Cuba","Czech Republic","Denmark","Egypt","Ethiopia","Finland","France","Germany","Ghana","Greece","Guatemala","Haiti","Hungary","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kenya","Lebanon","Libya","Malaysia","Mexico","Morocco","Myanmar","Nepal","Netherlands","Nigeria","North Korea","Norway","Pakistan","Palestine","Peru","Philippines","Poland","Portugal","Romania","Russia","Saudi Arabia","Serbia","Somalia","South Africa","South Korea","Spain","Sri Lanka","Sudan","Sweden","Switzerland","Syria","Taiwan","Thailand","Turkey","Uganda","Ukraine","United Kingdom","United States","Venezuela","Vietnam","Yemen","Zimbabwe","Other"];

function score(type){ return {Chapter:100,Paragraph:30,Art:50,Idea:20,Line:10}[type]||10; }
function uniqueCountries(){ return new Set(state.contributions.map(c=>c.contributor_country).filter(Boolean)).size; }

function render(){
  const c = state.contributions;
  const total = c.length;
  const root = document.getElementById('root');

  let tabContent = "";

  if(state.activeTab==="wall"){
    if(c.length===0){
      tabContent = `<div class="empty-state"><div class="icon">📖</div><p>The first page is blank. Be the first to write.</p><br><button class="btn-gold" onclick="openForm()" style="padding:10px 28px;font-size:0.9rem;">Write the First Line</button></div>`;
    } else {
      tabContent = c.map(contrib=>`
        <div class="contrib-item">
          <p class="contrib-text">"${contrib.content}"</p>
          <div class="contrib-meta">
            <span>✍️ ${contrib.contributor_name}</span>
            ${contrib.contributor_country?`<span>🌍 ${contrib.contributor_country}</span>`:''}
            <span style="color:#5a5a3a">${contrib.content_type} · ${contrib.contribution_score} pts</span>
          </div>
        </div>`).join('');
    }
  } else if(state.activeTab==="leaderboard"){
    if(c.length===0){
      tabContent = `<div class="empty-state"><p>No contributors yet. Be the first legend.</p></div>`;
    } else {
      tabContent = c.slice(0,20).map((contrib,i)=>`
        <div class="lb-row">
          <div class="lb-rank ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
          <div><div class="lb-name">${contrib.contributor_name}</div><div class="lb-sub">${contrib.contributor_country||''} · ${contrib.content_type}</div></div>
          <div class="lb-pts">${contrib.contribution_score} pts</div>
        </div>`).join('');
    }
  } else {
    tabContent = `
      ${[
        {icon:"✍️",title:"1. Contribute",desc:"Write a line, paragraph, chapter, idea or artwork. Every contribution earns you points."},
        {icon:"📊",title:"2. Points = Ownership",desc:"Your contribution score is your share. The more you contribute, the bigger your slice."},
        {icon:"💰",title:"3. Monetization",desc:"When the book is published or licensed — revenue is split to all contributors based on their score."},
        {icon:"🚀",title:"4. Share & Multiply",desc:"Invite others. Every person you bring in boosts your referral score and earnings."},
        {icon:"🌍",title:"5. Break Records",desc:"Goal: most contributors from most countries in history. Every country. Every language. One book."},
      ].map(it=>`<div class="how-item"><div class="how-icon">${it.icon}</div><div><div class="how-title">${it.title}</div><div class="how-desc">${it.desc}</div></div></div>`).join('')}
      <div class="scoring-box"><div class="scoring-title">📐 Contribution Scoring</div>One Line → 10 pts<br>Paragraph → 30 pts<br>Chapter → 100 pts<br>Artwork → 50 pts<br>Idea/Concept → 20 pts</div>`;
  }

  const successHTML = state.submitted && state.submittedData ? `
    <div class="success-msg">
      <p class="thanks">🌟 Your words are now part of history. Thank you, ${state.submittedData.name}.</p>
      <p class="share-label">SHARE YOUR CONTRIBUTION — INVITE THE WORLD</p>
      <div class="share-btns">
        <a class="share-btn" style="background:#1da1f2" href="https://twitter.com/intent/tweet?text=${encodeURIComponent('I just wrote my line in "One World, One Book" 🌍✍️ Join me: https://spark-app-b2d3d2c6.base44.app')}" target="_blank">𝕏 Twitter</a>
        <a class="share-btn" style="background:#25d366" href="https://wa.me/?text=${encodeURIComponent('✍️ I added my voice to a book being written by humanity. Write yours 👉 https://spark-app-b2d3d2c6.base44.app')}" target="_blank">💬 WhatsApp</a>
        <a class="share-btn" style="background:#0077b5" href="https://www.linkedin.com/shareArticle?mini=true&url=https%3A%2F%2Fspark-app-b2d3d2c6.base44.app" target="_blank">in LinkedIn</a>
      </div>
    </div>` : '';

  const modalHTML = state.showForm ? `
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">✍️ Add Your Voice</span>
          <button class="modal-close" onclick="closeForm()">×</button>
        </div>
        <p class="modal-quote">"Even one line from you makes this book more complete. More human. More real."</p>
        <div class="form-group">
          <label class="form-label">YOUR NAME *</label>
          <input class="form-input" id="f-name" placeholder="The name history will remember" value="${state.form.name}" oninput="updateForm('name',this.value)" />
        </div>
        <div class="form-group">
          <label class="form-label">YOUR COUNTRY *</label>
          <select class="form-input" id="f-country" onchange="updateForm('country',this.value)">
            <option value="">Select your country</option>
            ${COUNTRIES.map(cn=>`<option value="${cn}" ${state.form.country===cn?'selected':''}>${cn}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">EMAIL (for earnings notification)</label>
          <input class="form-input" type="email" id="f-email" placeholder="we'll notify you when you earn" value="${state.form.email}" oninput="updateForm('email',this.value)" />
        </div>
        <div class="form-group">
          <label class="form-label">CONTRIBUTION TYPE</label>
          <div class="type-btns">
            ${["Line","Paragraph","Chapter","Art","Idea"].map(t=>`<button class="type-btn ${state.form.type===t?'active':''}" onclick="updateForm('type','${t}')">${t}</button>`).join('')}
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">YOUR WORDS *</label>
          <textarea class="form-input" id="f-content" rows="${state.form.type==='Chapter'?10:state.form.type==='Paragraph'?5:3}" placeholder="${state.form.type==='Line'?"Write one powerful line... even 'I believe in peace' is enough.":"Share your thoughts, your story, your vision for the world..."}" oninput="updateForm('content',this.value)" style="resize:vertical;line-height:1.8">${state.form.content}</textarea>
        </div>
        ${state.submitError?`<div class="error-box">⚠️ ${state.submitError}</div>`:''}
        <button class="btn-gold" style="width:100%;padding:14px;font-size:1rem;" onclick="submitForm()" ${state.loading?'disabled':''}>
          ${state.loading ? "Submitting..." : "✍️ SUBMIT TO HISTORY"}
        </button>
        <p style="color:#555;font-size:11px;text-align:center;margin-top:10px;">By contributing, you agree to share in the monetization of this collective work.</p>
      </div>
    </div>` : '';

  root.innerHTML = `
    <div class="hero">
      <div class="hero-badge">🌍 A Global Movement</div>
      <h1>One World,<br>One Book —<br><span>Written by Humanity</span></h1>
      <p>Wars divide us. But words unite us.<br>
         This book is being written — right now — by people from every country on Earth.<br>
         <strong style="color:#e8d5b7">One line from you could change everything.</strong></p>
      <div class="stats">
        <div><div class="stat-val">${total*12}+</div><div class="stat-lbl">Words Written</div></div>
        <div><div class="stat-val">${total}</div><div class="stat-lbl">Contributors</div></div>
        <div><div class="stat-val">${uniqueCountries()||'Be the first!'}</div><div class="stat-lbl">Countries</div></div>
      </div>
      <button class="btn-gold" onclick="openForm()">✍️ ADD YOUR VOICE TO HISTORY</button>
      ${successHTML}
    </div>

    <div class="banner">
      <p>"Somewhere right now, a child in Gaza, a soldier in Ukraine, a mother in Sudan — they all share the same sky.<br>
         This book is their story. It is your story. It is our story.<br>
         <strong style="color:#e8d5b7">Write one line. Be the bridge.</strong>"</p>
    </div>

    <div class="tabs-wrap">
      <div class="tabs">
        ${[["wall","📜 Contribution Wall"],["leaderboard","🏆 Contributors"],["about","💡 How You Earn"]].map(([k,l])=>
          `<button class="tab-btn ${state.activeTab===k?'active':''}" onclick="setTab('${k}')">${l}</button>`).join('')}
      </div>
      <h2 class="section-title">${state.activeTab==="wall"?"THE BOOK IS BEING WRITTEN...":state.activeTab==="leaderboard"?"HISTORY MAKERS":"HOW THE ECONOMY WORKS"}</h2>
      ${tabContent}
    </div>

    <div class="cta-footer">
      <h2>The world is watching.<br>What will you write?</h2>
      <p>In 100 years, when people read this book, your name will be there.<br>You chose peace. You chose to build. You chose humanity.</p>
      <button class="btn-gold" onclick="openForm()">✍️ WRITE YOUR LINE NOW</button>
    </div>

    <div class="site-footer">CoCreate © 2026 — A Contribution Economy Platform by Mandar</div>

    ${modalHTML}
  `;
}

function openForm(){ state.showForm=true; state.submitError=null; render(); }
function closeForm(){ state.showForm=false; state.submitError=null; render(); }
function setTab(t){ state.activeTab=t; render(); }
function updateForm(field,val){ state.form[field]=val; }

function submitForm(){
  const f = state.form;
  if(!f.name.trim()){ state.submitError="Please enter your name."; render(); return; }
  if(!f.country){ state.submitError="Please select your country."; render(); return; }
  if(!f.content.trim()){ state.submitError="Please write something — even one line."; render(); return; }

  state.loading=true; state.submitError=null; render();

  setTimeout(()=>{
    const newContrib = {
      id: Date.now(),
      contributor_name: f.name,
      contributor_country: f.country,
      content: f.content,
      content_type: f.type,
      contribution_score: score(f.type)
    };
    state.contributions = [newContrib, ...state.contributions];
    state.submittedData = { name: f.name, country: f.country, content: f.content };
    state.submitted = true;
    state.showForm = false;
    state.loading = false;
    state.form = { name:"", country:"", email:"", type:"Line", content:"" };
    state.activeTab = "wall";
    render();
  }, 900);
}

render();
</script>
